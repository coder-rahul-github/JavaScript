<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
    <form action="">
        <p>
            <label for="height">Height</label>
            <input id="height" type="text" name="height" placeholder="Enter Height"></input>
        </p>
        <p>
            <label for="weight">Weight</label>
            <input id="weight" type="text" name="weight" placeholder="Enter Weight"></input>
        </p>
        <button type="submit">Submit</button>
    </form>
    <div id="result">
    </div>
    <div id="Weight -guide">
        <h3>BMI Weight Guide</h3>
        <p>UnderWeight: BMI < 18.6 </p>
        <p>Normal Range: 18.6 < BMI < 24.9 </p>
        <p>Over Weight: BMI > 24.9 </p>
    </div>
    <script src="./bmicalc.js"></script>
</body>
</html>
